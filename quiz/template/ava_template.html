<!DOCTYPE html>
<html lang="pt-BR">

<!--
  ════════════════════════════════════════════════════════════
  NEXUS STUDY — ava_template.html
  Template para páginas de AVALIAÇÃO (AVA).

  COMO USAR:
  1. Copie este arquivo para: quiz/disciplinas/<disc>/ava.html
  2. Personalize as seções marcadas com ⚙️ CUSTOMIZE
  3. Crie o arquivo de conteúdo em: quiz/conteudo/<disc>_ava.js
  4. Altere o data-disciplina no <body>

  DIFERENÇA quiz_template x ava_template:
  - AVA usa --cor-tema (cor primária) como acento
  - Quiz usa --cor-tema-2 (cor secundária) como acento
  - AVA é voltado para avaliações formais; quiz para prática

  DEPENDÊNCIAS:
  - ../../template_global.css
  - ../../ava_template.css
  - ../../conteudo/quiz_engine.js
  - ../../conteudo/<disciplina>_ava.js
  ════════════════════════════════════════════════════════════
-->

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ⚙️ CUSTOMIZE: título da página -->
  <title>AVA · POO — Nexus Study</title>

  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <!-- Ícones -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

  <!-- ⚙️ CUSTOMIZE: cores da disciplina -->
  <style>
    :root {
      /* POO */
      --cor-tema:       #7aa8e8;
      --cor-tema-rgb:   122, 168, 232;
      --cor-tema-2:     #4dd9b4;
      --cor-tema-2-rgb: 77, 217, 180;

      /* Redes:
      --cor-tema:       #4dd9b4;  --cor-tema-rgb: 77, 217, 180;
      --cor-tema-2:     #7aa8e8;  --cor-tema-2-rgb: 122, 168, 232; */

      /* Design:
      --cor-tema:       #e8c97a;  --cor-tema-rgb: 232, 201, 122;
      --cor-tema-2:     #4dd9b4;  --cor-tema-2-rgb: 77, 217, 180; */

      /* Banco de Dados:
      --cor-tema:       #e87a9a;  --cor-tema-rgb: 232, 122, 154;
      --cor-tema-2:     #e8c97a;  --cor-tema-2-rgb: 232, 201, 122; */
    }
  </style>

  <!-- CSS base + template AVA -->
  <link rel="stylesheet" href="../../template_global.css" />
  <link rel="stylesheet" href="../../ava_template.css" />
</head>

<!-- ⚙️ CUSTOMIZE: data-disciplina (identificador único para localStorage) -->
<body data-disciplina="poo-ava">

  <!-- ── Efeitos de fundo ─────────────────────────────────── -->
  <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--2" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--3" aria-hidden="true"></div>
  <div class="bg-grid"          aria-hidden="true"></div>

  <!-- ════════════════════════════════════════════════════════
       HEADER
       ════════════════════════════════════════════════════════ -->
  <header class="header">
    <div class="header__inner">

      <!-- Voltar -->
      <!-- ⚙️ CUSTOMIZE: href aponta para a página da disciplina -->
      <a href="../poo.html" class="back-btn" aria-label="Voltar para POO">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span>Voltar</span>
      </a>

      <!-- Logo -->
      <a href="../../quiz.html" class="header__logo" aria-label="Nexus Study">
        <div class="logo-mark" aria-hidden="true">N</div>
        <div class="logo-text">
          <span class="logo-title">Nexus</span>
          <span class="logo-sub">Study</span>
        </div>
      </a>

      <!-- Breadcrumb -->
      <!-- ⚙️ CUSTOMIZE: primeiro item = disciplina -->
      <nav class="breadcrumb" aria-label="Localização">
        <span class="breadcrumb__item">POO</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="breadcrumb__item breadcrumb__item--active">AVA</span>
      </nav>

    </div>
  </header>

  <!-- ════════════════════════════════════════════════════════
       MAIN
       ════════════════════════════════════════════════════════ -->
  <main class="main" id="main-content">

    <!-- Page Header -->
    <div class="page-header">
      <div class="page-header__eyebrow">
        <!-- ⚙️ CUSTOMIZE: emoji + disciplina -->
        <span aria-hidden="true">💻</span>
        <span>Programação Orientada a Objetos</span>
      </div>

      <!-- ⚙️ CUSTOMIZE: título + subtítulo em itálico -->
      <h1 class="page-header__title">
        Avaliação <em>AVA</em>
      </h1>

      <!-- Metadados (preenchidos pelo JS) -->
      <div class="page-header__meta" id="quiz-meta" aria-live="polite">
        <span class="meta-badge" id="meta-total">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
          <span>— questões</span>
        </span>
        <span class="meta-badge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>Avaliação formal</span>
        </span>
      </div>
    </div>

    <!-- Contêiner do quiz (preenchido pelo JS) -->
    <div id="quiz-container" aria-label="Questões da AVA" role="main"></div>

    <!-- Botões de ação -->
    <div class="submit-container" id="submit-container">
      <div class="buttons-container">
        <button id="restart" class="action-button restart-button" type="button">
          <i class="fas fa-rotate-right" aria-hidden="true"></i>
          <span>Reiniciar</span>
        </button>
        <button id="errors" class="action-button errors-button" type="button" aria-live="polite">
          <i class="fas fa-triangle-exclamation" aria-hidden="true"></i>
          <span>Ver erros</span>
        </button>
        <button id="reveal" class="action-button reveal-button" type="button">
          <i class="fas fa-eye" aria-hidden="true"></i>
          <span>Revelar</span>
        </button>
      </div>
    </div>

    <!-- Resultado global (preenchido pelo JS) -->
    <div id="results" class="results" role="status" aria-live="polite"></div>

  </main>

  <!-- ════════════════════════════════════════════════════════
       FOOTER
       ════════════════════════════════════════════════════════ -->
  <!-- ⚙️ CUSTOMIZE -->
  <footer class="page-footer">
    Nexus Study · POO · Avaliação AVA
  </footer>

  <!-- ════════════════════════════════════════════════════════
       NAV FLUTUANTE
       ════════════════════════════════════════════════════════ -->
  <nav class="nav-float" aria-label="Navegação rápida">
    <button id="btn-up"   class="nav-btn" title="Ir ao topo"  type="button"><i class="fas fa-arrow-up"    aria-hidden="true"></i></button>
    <button id="btn-left" class="nav-btn" title="Voltar"      type="button"><i class="fas fa-rotate-left" aria-hidden="true"></i></button>
    <button id="btn-down" class="nav-btn" title="Ir ao final" type="button"><i class="fas fa-arrow-down"  aria-hidden="true"></i></button>

    <div class="nav-divider" aria-hidden="true"></div>

    <button id="restartButton" class="nav-btn" title="Reiniciar"         type="button"><i class="fas fa-rotate-right" aria-hidden="true"></i></button>
    <button id="revealButton"  class="nav-btn" title="Revelar respostas" type="button"><i class="fas fa-eye"          aria-hidden="true"></i></button>

    <div class="nav-divider" aria-hidden="true"></div>

    <!-- Toggle modo step -->
    <button id="btn-toggle-modo" class="nav-btn btn-toggle-modo"
            title="Modo Step — uma questão por vez"
            type="button">
      <i class="fas fa-layer-group" aria-hidden="true"></i>
    </button>
  </nav>

  <!-- ════════════════════════════════════════════════════════
       SCRIPTS
       Ordem: conteúdo → engine → storage
       ════════════════════════════════════════════════════════ -->

  <!-- ⚙️ CUSTOMIZE: arquivo de dados da AVA -->
  <script src="../../conteudo/poo_ava.js"></script>

  <!-- Engine compartilhada -->
  <script src="../../conteudo/quiz_engine.js"></script>

  <!-- Persistência localStorage (opcional) -->
  <script>
    (function () {
      var s = document.createElement('script');
      s.src = '../../storage.js';
      s.onerror = function () { console.info('[Nexus] storage.js não encontrado — auto-save desativado.'); };
      document.body.appendChild(s);
    })();
  </script>

  <!-- Navegação esquerda -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // ⚙️ CUSTOMIZE: href do btn-left
      document.getElementById('btn-left').addEventListener('click', function () {
        window.location.href = '../poo.html';
      });
    });
  </script>

</body>
</html>
