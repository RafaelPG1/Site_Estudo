<!--
  NEXUS STUDY — quiz/template/template.html  v10.1
  Template unificado para todos os modos (ava, questoes, enade, etc.)
  Lógica compartilhada → template_init.js

  v10.1 — STARTER MODAL:
    + ../js/quiz_starter_modal.js   → modal de boas-vindas

    IMPORTANTE: os arquivos ficam em quiz/js/ (mesma pasta de
    quiz_engine.js e quiz_ui.js). O template está em quiz/template/,
    então os paths são relativos com ../js/.
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Study</title>

  <!-- ═══════════════════════════════════════════
       FONTES
  ═══════════════════════════════════════════ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

  <!-- ═══════════════════════════════════════════
       ESTILOS BASE
  ═══════════════════════════════════════════ -->
  <link rel="stylesheet" href="../../shared/css/themes/fundo.css" />

  <!-- ═══════════════════════════════════════════
       ESTILOS DE ÁUDIO (sound antes de audio-btns)
  ═══════════════════════════════════════════ -->
  <link rel="stylesheet" href="../../shared/css/audio/sound.css" />
  <link rel="stylesheet" href="../../shared/css/audio/audio-btns.css" />

  <!-- ═══════════════════════════════════════════
       ESTILOS DE COMPONENTES
  ═══════════════════════════════════════════ -->
  <link rel="stylesheet" href="../../shared/css/ia/ia.css" />

  <!-- ═══════════════════════════════════════════
       ESTILOS DA PÁGINA
  ═══════════════════════════════════════════ -->
  <link rel="stylesheet" href="./template.css" />


  <!--
    [INLINE SCRIPT] Roda ANTES do módulo template_init.js.
    Lê ?disc= e ?sem= da URL e já corrige o href do back-btn
    de forma síncrona — sem esperar o módulo carregar.
  -->
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var disc   = params.get('disc') || 'poo';
      var sem    = params.get('sem')  || '2026.2';
      var ano    = sem.split('.')[0];
      var href   = '../disciplinas/' + ano + '/' + disc + '.html?sem=' + sem;

      document.addEventListener('DOMContentLoaded', function () {
        var btn = document.querySelector('.back-btn');
        if (btn) btn.href = href;
      });

      window.__NEXUS_BACK_HREF_EARLY__ = href;
    })();
  </script>
</head>

<body data-disciplina="" data-modo="">

  <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--2" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--3" aria-hidden="true"></div>
  <div class="bg-grid"          aria-hidden="true"></div>

  <!-- ═══════════════════════════════════════════
       HEADER
  ═══════════════════════════════════════════ -->
  <header class="header">
    <div class="header__inner">

      <a href="../disciplinas/2026/poo.html?sem=2026.2"
         class="back-btn"
         aria-label="Voltar para a disciplina">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span>Voltar</span>
      </a>

      <div id="header-logo-wrap" class="header__logo"></div>

      <div id="header-sem-badge" class="header__sem-badge"></div>

    </div>
  </header>

  <!-- ═══════════════════════════════════════════
       MAIN
  ═══════════════════════════════════════════ -->
  <main class="main" id="main-content">

    <div class="page-header">
      <div class="page-header__eyebrow">
        <span aria-hidden="true" id="disc-emoji">💻</span>
        <span id="disc-nome">Disciplina</span>
      </div>
      <h1 class="page-header__title" id="page-title-h1">
        Carregando...
      </h1>
    </div>

    <div id="quiz-container" aria-label="Questões" role="main"></div>

    <div class="submit-container" id="submit-container">
      <div class="buttons-container">
        <button id="restart" class="action-button restart-button" type="button">
          <svg class="restart-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="3" stroke-linecap="round"
               stroke-linejoin="round" aria-hidden="true">
            <path d="M21 9a9.01 9.01 0 0 0-16.95 1"/>
            <polyline points="21 3 21 9 15 9"/>
            <path d="M3 15a9.01 9.01 0 0 0 16.95-1"/>
            <polyline points="3 21 3 15 9 15"/>
          </svg>
          <span>Reiniciar</span>
        </button>
        <button id="errors" class="action-button errors-button" type="button" aria-live="polite">
          <i class="fas fa-triangle-exclamation" aria-hidden="true"></i>
          <span>Ver erros</span>
        </button>
        <button id="reveal" class="action-button reveal-button" type="button">
          <i class="fas fa-eye" aria-hidden="true"></i>
          <span>Revelar</span>
        </button>
      </div>
    </div>

    <div id="results" class="results" role="status" aria-live="polite"></div>

  </main>

  <!-- ═══════════════════════════════════════════
       FOOTER
  ═══════════════════════════════════════════ -->
  <footer class="page-footer" id="page-footer">
    Nexus Study
  </footer>

  <!-- ═══════════════════════════════════════════
       SCRIPTS

       Ordem:
         1. template_init.js (módulo ES) — orquestra o quiz,
            expõe __NEXUS_QUIZ_DISC__, __NEXUS_QUIZ_MODO__ etc.
         2. quiz_starter_modal.js (clássico, defer) — modal de início.
            defer garante que roda após o HTML ser parseado.
            Aguarda internamente as vars do template_init via polling.

       quiz_ui.js e quiz_engine.js são injetados dinamicamente
       por template_init._carregarQuiz() — não precisam de <script> aqui.
  ═══════════════════════════════════════════ -->
<script type="module" src="template_init.js"></script>

<!-- Dependências do Quiz-Assistant -->
<script src="../../shared/js/ia/core/ui.js" defer></script>
<script src="../../shared/js/ia/core/history.js" defer></script>
<script src="../../shared/js/ia/core/worker.js" defer></script>
<script src="../../shared/js/ia/quiz/assistant.js" defer></script>

<script src="../js/quiz_starter_modal.js" defer></script>
<script src="../../shared/js/utils/quick-access.js"></script>
<script src="../../shared/js/ia/core/fab.js"></script>
</body>
</html>
