<!--
  NEXUS STUDY — quiz/template/template.html  v11.3
  Template unificado para todos os modos (ava, questoes, enade, etc.)

  v11.3 — ORDEM DE CARREGAMENTO DOS SCRIPTS REFATORADA:
    filter.js agora é carregado como defer ANTES de quiz_starter_modal.js.
    Isso garante que window.NexusFilter existe quando o modal renderiza,
    eliminando a dependência circular e qualquer forma de polling.

  v11.2 — REMOÇÃO DO BOOT SYSTEM:
    - Removidos: nexus_boot.js, nexus_boot.css, splash screen, data-booting
    - Controle de visibilidade local: .main.quiz-aguardando (esconde o main inteiro)
    - quiz_starter_modal.js remove a classe quando o fluxo é decidido
    - Zero bloqueio global de UI, zero arquitetura de boot
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Study</title>

  <!-- ═══════════════════════════════════════════
       MAIN — oculto até o modal decidir o fluxo.
       quiz_starter_modal.js remove a classe quando pronto.
       Esconde o main inteiro: questões, botões e header da página,
       evitando qualquer flash antes do modal aparecer.
       O header (logo, voltar, semestre) fica visível — é leve e
       não causa confusão ao usuário.
  ═══════════════════════════════════════════ -->
  <style>
    /* main invisível enquanto o modal não decidiu */
    .main.quiz-aguardando {
      visibility: hidden;
      opacity: 0;
    }
    /* Fade-in suave quando quiz-aguardando é removida */
    .main {
      transition: opacity 0.2s ease;
    }
  </style>

  <!-- ═══════════════════════════════════════════
       FONTES
  ═══════════════════════════════════════════ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

  <!-- ═══════════════════════════════════════════
       ESTILOS BASE
  ═══════════════════════════════════════════ -->
  <link rel="stylesheet" href="../../shared/css/themes/fundo.css" />
  <link rel="stylesheet" href="../../shared/css/audio/sound.css" />
  <link rel="stylesheet" href="../../shared/css/audio/audio-btns.css" />
  <link rel="stylesheet" href="../../shared/css/ia/ia.css" />
  <link rel="stylesheet" href="./template.css" />

  <!--
    Script inline de URL — sem tocar em body ou classList.
    Apenas lê parâmetros e salva numa variável global.

    Também sinaliza __NSM_AGUARDANDO__ = true ANTES de qualquer
    script defer (engine, modal, etc). Isso é necessário porque
    quiz_starter_modal.js também é defer — se a flag só fosse
    setada no corpo dele, a ordem real de execução entre os
    defers (engine vs modal) não teria garantia absoluta, e o
    engine poderia, em tese, renderizar antes do modal decidir
    o fluxo. Setando aqui, de forma síncrona e antecipada, o
    engine sempre vê a flag = true em sua primeira checagem,
    independente da ordem de resolução dos demais scripts.
    O próprio quiz_starter_modal.js é quem depois define false.
  -->
  <script>
    (function () {
      window.__NSM_AGUARDANDO__ = true;

      var params = new URLSearchParams(location.search);
      var disc   = params.get('disc') || 'poo';
      var sem    = params.get('sem')  || '2026.2';
      var ano    = sem.split('.')[0];
      window.__NEXUS_BACK_HREF_EARLY__ =
        '../disciplinas/' + ano + '/' + disc + '.html?sem=' + sem;
    })();
  </script>
</head>

<!--
  data-disciplina e data-modo são preenchidos por template_init.js.
-->
<body data-disciplina="" data-modo="">

  <div class="atmo atmo--1" aria-hidden="true"></div>
  <div class="atmo atmo--2" aria-hidden="true"></div>

  <!-- ═══════════════════════════════════════════
       HEADER
  ═══════════════════════════════════════════ -->
  <header class="header">
    <div class="header__inner">

      <a href="#" class="back-btn" aria-label="Voltar para a disciplina">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span>Voltar</span>
      </a>

      <div id="header-logo-wrap" class="header__logo"></div>
      <div id="header-sem-badge" class="header__sem-badge"></div>

    </div>
  </header>

  <!-- ═══════════════════════════════════════════
       MAIN
  ═══════════════════════════════════════════ -->
  <main class="main quiz-aguardando" id="main-content">

    <div class="page-header">
      <div class="page-header__eyebrow">
        <span aria-hidden="true" id="disc-emoji">💻</span>
        <span id="disc-nome">Disciplina</span>
      </div>
      <h1 class="page-header__title" id="page-title-h1">
        Carregando...
      </h1>
    </div>

    <div id="quiz-container" aria-label="Questões" role="main"></div>

    <div class="submit-container" id="submit-container">
      <div class="buttons-container">
        <button id="restart" class="action-button restart-button" type="button">
          <svg class="restart-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="3" stroke-linecap="round"
               stroke-linejoin="round" aria-hidden="true">
            <path d="M21 9a9.01 9.01 0 0 0-16.95 1"/>
            <polyline points="21 3 21 9 15 9"/>
            <path d="M3 15a9.01 9.01 0 0 0 16.95-1"/>
            <polyline points="3 21 3 15 9 15"/>
          </svg>
          <span>Reiniciar</span>
        </button>
        <button id="errors" class="action-button errors-button" type="button" aria-live="polite">
          <i class="fas fa-triangle-exclamation" aria-hidden="true"></i>
          <span>Ver erros</span>
        </button>
        <button id="reveal" class="action-button reveal-button" type="button">
          <i class="fas fa-eye" aria-hidden="true"></i>
          <span>Revelar</span>
        </button>
      </div>
    </div>

    <div id="results" class="results" role="status" aria-live="polite"></div>

  </main>

  <footer class="page-footer" id="page-footer">Nexus Study</footer>

  <!-- ═══════════════════════════════════════════
       SCRIPTS

       ORDEM DELIBERADA — garantia de dependências sem polling:

         1. template_init.js   → tema, header, nav-float, áudio (module)
         2. filter.js          → FilterStore + FilterPanel + window.NexusFilter
                                  DEVE vir antes do modal para que
                                  NexusFilter.open() já exista quando o
                                  usuário interagir com "Filtrar aulas".
         3. quiz_starter_modal.js → decide o fluxo, chama NexusFilter.open()
                                     diretamente (sem polling, sem espera)
         4. fab.js              → cria #nexus-fab
         5. quick-access.js     → botões de acesso rápido
         6. ui/history/worker/assistant → Quiz-Assistant (menor prioridade visual)

       Os scripts defer executam na ORDEM em que aparecem no HTML,
       após o parsing completo — essa ordem é a garantia arquitetural.
  ═══════════════════════════════════════════ -->
  <script type="module" src="template_init.js"></script>

  <!-- filter.js antes do modal: NexusFilter disponível sem polling -->
  <script src="../js/filter.js" defer></script>

  <!-- modal decide o fluxo; NexusFilter já existe -->
  <script src="../js/quiz_starter_modal.js" defer></script>

  <!-- fab.js cria o botão flutuante de IA independentemente -->
  <script src="../../shared/js/ia/core/fab.js" defer></script>

  <script src="../../shared/js/utils/quick-access.js" defer></script>

  <!-- Bloco do Quiz-Assistant — por último, de propósito -->
  <script src="../../shared/js/ia/core/ui.js" defer></script>
  <script src="../../shared/js/ia/core/history.js" defer></script>
  <script src="../../shared/js/ia/core/worker.js" defer></script>
  <script src="../../shared/js/ia/quiz/assistant.js" defer></script>

</body>
</html>
