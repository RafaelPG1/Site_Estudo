<!--
  NEXUS STUDY — quiz/quiz.html
  Página de seleção de disciplinas.

  ALTERAÇÕES — Integração da IA do Index (Resumo) v1.0:
    - Adicionado shared/css/ia/ia.css (estilos do painel/FAB, igual ao Index)
    - Adicionado <script src="../shared/js/ia/core/fab.js"> ANTES do <main>,
      mesmo padrão do index.html: injeta o botão flutuante antecipadamente,
      antes do restante da página ser pintado.
    - Adicionados <link rel="modulepreload"> para os módulos de IA, mesmo
      padrão do index.html — apenas otimização de carregamento, não afeta
      comportamento.
    - Nenhum elemento de UI do quiz foi removido ou alterado.
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz · Nexus Study</title>

  <!-- ═══════════════════════════════════════════
       FONTES
  ═══════════════════════════════════════════ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- ═══════════════════════════════════════════
       ESTILOS BASE
  ═══════════════════════════════════════════ -->
  <link rel="stylesheet" href="../shared/css/themes/fundo.css" />

  <!-- ═══════════════════════════════════════════
       ESTILOS DE ÁUDIO (sound antes de audio-btns)
  ═══════════════════════════════════════════ -->
  <link rel="stylesheet" href="../shared/css/audio/sound.css" />
  <link rel="stylesheet" href="../shared/css/audio/audio-btns.css" />

  <!-- ═══════════════════════════════════════════
       ESTILOS DE IA (Resumo) — mesmo CSS do Index
       NÃO ALTERAR: igual a index.html, já está correto.
  ═══════════════════════════════════════════ -->
  <link rel="stylesheet" href="../shared/css/ia/ia.css" />

  <!-- ═══════════════════════════════════════════
       ESTILOS DE COMPONENTES
  ═══════════════════════════════════════════ -->

  <!-- Picker de semestre (mesmo CSS do index) -->
  <link rel="stylesheet" href="../shared/css/themes/semestre-picker.css" />

  <!-- ═══════════════════════════════════════════
       ESTILOS DA PÁGINA
  ═══════════════════════════════════════════ -->
  <link rel="stylesheet" href="quiz.css" />
</head>

<body>

  <!--
    fab.js: primeira instrução do <body>, mesmo padrão do index.html.
    Executa de forma síncrona — document.body já existe neste ponto,
    então o botão é injetado imediatamente, antes de qualquer outro
    elemento ser pintado. Nenhum evento é registrado aqui; isso é
    responsabilidade exclusiva de NexusUI.init() em quiz.js.
  -->
  <script src="../shared/js/ia/core/fab.js"></script>

  <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--2" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--3" aria-hidden="true"></div>
  <div class="bg-grid"          aria-hidden="true"></div>

  <!-- ═══════════════════════════════════════════
       HEADER
  ═══════════════════════════════════════════ -->
  <header class="header">
    <div class="header__inner">

      <a href="../index.html" class="back-btn" aria-label="Voltar ao início">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span>Início</span>
      </a>

      <div id="header-logo-wrap" class="header__logo"></div>

      <!-- Igual ao index: div vazia que o JS preenche via criarSemestreSelect() -->
      <div class="header__right">
        <div id="semestre-wrap"></div>
      </div>

    </div>
  </header>

  <!-- ═══════════════════════════════════════════
       MAIN
  ═══════════════════════════════════════════ -->
  <main class="main">

    <div class="page-header">
      <div class="page-header__eyebrow">
        <span aria-hidden="true">❓</span>
        <span>Modo Quiz</span>
      </div>
      <h1 class="page-header__title">Escolha a <em>disciplina</em></h1>
      <p class="page-header__desc">Selecione a matéria para iniciar sua sessão de estudos</p>
    </div>

    <div class="disciplines" id="disciplines-grid" role="list">
      <p class="disciplines-empty" id="disciplines-empty" aria-live="polite"></p>
    </div>

  </main>

  <!-- ═══════════════════════════════════════════
       FOOTER
  ═══════════════════════════════════════════ -->
  <footer class="footer">
    <p>© <span id="footer-year"></span> Nexus Study · Desenvolvido para facilitar seus estudos</p>
  </footer>

  <!-- ═══════════════════════════════════════════
       PRELOAD — IA (Resumo)
       Mesmo padrão do index.html. Apenas otimização de
       carregamento (hint ao navegador); quem efetivamente
       injeta os <script> é quiz.js → _carregarIA().
  ═══════════════════════════════════════════ -->
  <link rel="modulepreload" href="../shared/js/ia/core/context.js">
  <link rel="modulepreload" href="../shared/js/ia/core/text-utils.js">
  <link rel="modulepreload" href="../shared/js/ia/core/history.js">
  <link rel="modulepreload" href="../shared/js/ia/core/loader.js">
  <link rel="modulepreload" href="../shared/js/ia/core/worker.js">
  <link rel="modulepreload" href="../shared/js/ia/core/ui.js">
  <link rel="modulepreload" href="../shared/js/ia/resumo/search.js">

  <!-- ═══════════════════════════════════════════
       SCRIPTS
  ═══════════════════════════════════════════ -->
  <script type="module" src="quiz.js"></script>
  <script src="../shared/js/utils/quick-access.js"></script>

</body>
</html>
