<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz · Nexus Study</title>

  <!-- ═══════════════════════════════════════════
       FONTES
  ═══════════════════════════════════════════ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- ═══════════════════════════════════════════
       ESTILOS DE ÁUDIO (sound antes de audio-btns)
  ═══════════════════════════════════════════ -->
  <link rel="stylesheet" href="../shared/css/audio/sound.css" />
  <link rel="stylesheet" href="../shared/css/audio/audio-btns.css" />

  <!-- ═══════════════════════════════════════════
       ESTILOS DE IA (Resumo) — mesmo CSS do Index
       NÃO ALTERAR: já está correto.
  ═══════════════════════════════════════════ -->
  <link rel="stylesheet" href="../shared/css/ia/ia.css" />

  <!-- ═══════════════════════════════════════════
       ESTILOS DE COMPONENTES
  ═══════════════════════════════════════════ -->

  <!-- Picker de semestre (mesmo CSS do index) -->
  <link rel="stylesheet" href="../shared/css/themes/semestre-picker.css" />

  <!-- ═══════════════════════════════════════════
       ESTILOS DA PÁGINA
  ═══════════════════════════════════════════ -->
  <link rel="stylesheet" href="quiz.css" />

  <!-- ═══════════════════════════════════════════
       PRELOAD — IA (Resumo)
  ═══════════════════════════════════════════ -->
  <link rel="modulepreload" href="../shared/js/ia/core/context.js">
  <link rel="modulepreload" href="../shared/js/ia/core/text-utils.js">
  <link rel="modulepreload" href="../shared/js/ia/core/history.js">
  <link rel="modulepreload" href="../shared/js/ia/core/loader.js">
  <link rel="modulepreload" href="../shared/js/ia/core/worker.js">
  <link rel="modulepreload" href="../shared/js/ia/core/ui.js">
  <link rel="modulepreload" href="../shared/js/ia/resumo/search.js">

</head>

<body>

  <!--
    fab.js: primeira instrução do <body>, mesmo padrão do index.html.
    Injeta o botão flutuante antes de qualquer outro elemento ser pintado.
  -->
  <script src="../shared/js/ia/core/fab.js"></script>

  <!-- ══ CANVAS DE FUNDO ══ -->
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <!-- ══ CAMADAS ATMOSFÉRICAS ══ -->
  <div class="atmo atmo--1" aria-hidden="true"></div>
  <div class="atmo atmo--2" aria-hidden="true"></div>

  <!-- ══ HEADER ══ -->
  <header class="site-header">
    <div class="site-header__inner">

      <a href="../index.html" class="nav-back" aria-label="Voltar ao início">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span>Início</span>
      </a>

      <div id="header-logo-wrap" class="site-header__brand"></div>

      <div class="header-controls" id="header-controls">
        <div id="semestre-wrap"></div>
        <button class="cfg-btn" id="btn-quiz-config" aria-label="Configurações do Quiz" title="Configurações">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06
                     a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09
                     A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83
                     l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09
                     A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83
                     l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09
                     a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83
                     l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09
                     a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>

    </div>
  </header>

  <!-- ══ HERO ══ -->
  <section class="hero">
    <div class="hero__inner">
      <div class="hero__kicker">
        <span class="kicker-dot" aria-hidden="true"></span>
        Selecione a disciplina
      </div>
      <h1 class="hero__title">

        <span class="hero__title-line hero__title-line--accent">QUIZ</span>
      </h1>
      <p class="hero__sub">Escolha a matéria e inicie sua sessão de perguntas</p>
    </div>
  </section>

  <!-- ══ CARDS GRID ══ -->
  <main class="arena">
    <div class="arena__grid" id="disciplines-grid" role="list">
      <p class="arena__empty" id="disciplines-empty" aria-live="polite" style="display:none"></p>
    </div>
  </main>

  <!-- ══ FOOTER ══ -->
  <footer class="site-footer">
    <span>© <span id="footer-year"></span> Nexus Study</span>
    <span class="site-footer__sep" aria-hidden="true">·</span>
    <span>Desenvolvido para facilitar seus estudos</span>
  </footer>

  <!-- ══ SCRIPTS ══ -->
  <script type="module" src="quiz.js"></script>
  <script src="../shared/js/utils/quick-access.js"></script>

</body>
</html>
