<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Study</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="calendar.css" />
</head>
<body>

  <div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            <path d="M2 17l10 5 10-5" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            <path d="M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="sidebar-brand-name">Nexus Study</span>
      </div>

      <nav class="sidebar-nav">
        <button class="sidebar-item active" id="nav-agenda">
          <span class="sidebar-item-icon">📅</span>
          <span class="sidebar-item-label">Agenda</span>
        </button>
        <button class="sidebar-item" id="nav-new-study">
          <span class="sidebar-item-icon">➕</span>
          <span class="sidebar-item-label">Novo estudo</span>
        </button>
        <button class="sidebar-item" id="nav-routine">
          <span class="sidebar-item-icon">⚙</span>
          <span class="sidebar-item-label">Rotina de estudos</span>
        </button>
      </nav>
    </aside>

    <!-- MAIN -->
    <div class="app-main">

      <!-- HEADER: minimal week navigation, part of the title -->
      <header class="week-nav">
        <button class="week-nav-arrow" id="btn-prev" aria-label="Semana anterior">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

        <button class="week-nav-title" id="week-nav-title">
          <h1 class="week-title" id="week-title">Semana atual</h1>
          <span class="week-range" id="week-range"></span>
        </button>

        <button class="week-nav-arrow" id="btn-next" aria-label="Próxima semana">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

        <div class="week-menu-wrap">
          <button class="week-menu-btn" id="week-menu-btn" aria-label="Ações da semana">⋮</button>
          <div class="week-menu" id="week-menu">
            <button class="week-menu-item" id="action-copy-prev-week">Copiar semana anterior</button>
            <button class="week-menu-item week-menu-item-danger" id="action-clear-week">Limpar semana</button>
          </div>
        </div>
      </header>

      <!-- CALENDAR CONTAINER (premium, centered, max-width) -->
      <main class="calendar-main">
        <div class="calendar-grid" id="calendar-grid">
          <!-- Days rendered by JS -->
        </div>
      </main>

    </div>
  </div>

  <!-- MODAL: New / Edit Session -->
  <div class="modal-overlay" id="modal-session" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Novo estudo</h2>
        <button class="modal-close" id="modal-close" aria-label="Fechar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>

      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="input-day">Dia da semana</label>
          <select class="form-input form-select" id="input-day">
            <option value="0">Segunda</option>
            <option value="1">Terça</option>
            <option value="2">Quarta</option>
            <option value="3">Quinta</option>
            <option value="4">Sexta</option>
            <option value="5">Sábado</option>
            <option value="6">Domingo</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="input-time">Hora inicial <span class="optional">(opcional)</span></label>
            <input class="form-input" type="time" id="input-time" />
          </div>
          <div class="form-group">
            <label class="form-label" for="input-time-end">Hora final <span class="optional">(opcional)</span></label>
            <input class="form-input" type="time" id="input-time-end" />
          </div>
        </div>
        <p class="field-hint" id="duration-hint" style="display:none"></p>
        <p class="field-hint">Deixe os horários em branco para criar um estudo planejado, sem horário definido.</p>

        <div class="form-group">
          <label class="form-label" for="input-subject">Conteúdo</label>
          <div class="subject-select-wrap">
            <input class="form-input" type="text" id="input-subject" placeholder="Ex: Matemática, Física…" autocomplete="off" />
            <div class="subject-suggestions" id="subject-suggestions"></div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="input-note">Observação <span class="optional">(opcional)</span></label>
          <textarea class="form-input form-textarea" id="input-note" rows="3" placeholder="Capítulo, exercícios, revisão…"></textarea>
        </div>

        <div class="color-picker-group">
          <label class="form-label">Cor do cartão</label>
          <div class="color-options" id="color-options">
            <button class="color-dot active" data-color="blue" style="--c:#3B6FD4" aria-label="Azul"></button>
            <button class="color-dot" data-color="purple" style="--c:#7C3AED" aria-label="Roxo"></button>
            <button class="color-dot" data-color="green" style="--c:#1A7A4A" aria-label="Verde"></button>
            <button class="color-dot" data-color="amber" style="--c:#92620A" aria-label="Âmbar"></button>
            <button class="color-dot" data-color="rose" style="--c:#9B2034" aria-label="Rosa"></button>
            <button class="color-dot" data-color="teal" style="--c:#0F766E" aria-label="Teal"></button>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-danger" id="btn-delete" style="display:none">Excluir</button>
        <div class="modal-footer-right">
          <button class="btn-cancel" id="btn-cancel">Cancelar</button>
          <button class="btn-save" id="btn-save">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL: Rotina de estudos -->
  <div class="modal-overlay" id="modal-routine" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-routine-title">
      <div class="modal-header">
        <div>
          <h2 class="modal-title" id="modal-routine-title">Rotina de estudos</h2>
          <p class="modal-subtitle">Define os dias e o intervalo de horas exibidos na agenda</p>
        </div>
        <button class="modal-close" id="modal-routine-close" aria-label="Fechar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>

      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Dias ativos</label>
          <div class="day-toggle-row" id="routine-days">
            <label class="day-toggle"><input type="checkbox" data-day="0" checked /><span>Seg</span></label>
            <label class="day-toggle"><input type="checkbox" data-day="1" checked /><span>Ter</span></label>
            <label class="day-toggle"><input type="checkbox" data-day="2" checked /><span>Qua</span></label>
            <label class="day-toggle"><input type="checkbox" data-day="3" checked /><span>Qui</span></label>
            <label class="day-toggle"><input type="checkbox" data-day="4" checked /><span>Sex</span></label>
            <label class="day-toggle"><input type="checkbox" data-day="5" /><span>Sáb</span></label>
            <label class="day-toggle"><input type="checkbox" data-day="6" /><span>Dom</span></label>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="routine-start">Horário inicial do dia</label>
            <input class="form-input" type="time" id="routine-start" value="06:00" />
          </div>
          <div class="form-group">
            <label class="form-label" for="routine-end">Horário final do dia</label>
            <input class="form-input" type="time" id="routine-end" value="22:00" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="routine-min-session">Tempo mínimo por sessão</label>
          <select class="form-input form-select" id="routine-min-session">
            <option value="30">30 minutos</option>
            <option value="45">45 minutos</option>
            <option value="60" selected>1 hora</option>
            <option value="120">2 horas</option>
          </select>
        </div>
      </div>

      <div class="modal-footer">
        <div class="modal-footer-right">
          <button class="btn-cancel" id="btn-routine-cancel">Cancelar</button>
          <button class="btn-save" id="btn-routine-save">Salvar rotina</button>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="calendar.js"></script>
</body>
</html>
