<!DOCTYPE html>
<html lang="pt-BR" data-tema="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus — Painel Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>
  <div class="bg-grid"></div>

  <div class="layout" id="layout">

    <!-- Mobile overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <div class="sidebar__logo">
          <div class="logo-mark">N</div>
          <div class="sidebar__branding">
            <span class="sidebar__name">Nexus</span>
            <span class="sidebar__sub">Admin Panel</span>
          </div>
        </div>
      </div>

      <nav class="sidebar__nav" id="sidebar-nav">
        <!-- Populated by JS -->
      </nav>

      <div class="sidebar__bottom">
        <div class="sidebar__user" id="sidebar-user"></div>
        <button class="sidebar__logout" id="btn-logout">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Sair da conta
        </button>
      </div>
    </aside>

    <!-- ── MAIN ── -->
    <div class="main-wrap">
      <header class="topbar">
        <button class="topbar__hamburger" id="btn-hamburger" aria-label="Menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <h1 class="topbar__title" id="topbar-title">Dashboard</h1>
        <div class="topbar__actions">
          <button class="topbar__btn" id="btn-refresh" title="Atualizar dados">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
          </button>
          <a href="./admin.html" class="topbar__btn" title="Voltar ao site">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
          </a>
        </div>
      </header>

      <main class="content" id="content">
        <div class="init-loading">
          <div class="spinner"></div>
          <p>Verificando acesso…</p>
        </div>
      </main>
    </div>

  </div>

  <!-- MODAL + TOAST ROOTS -->
  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <script type="module" src="admin.js"></script>
</body>
</html>
