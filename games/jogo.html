<!-- games/jogo.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Study — Jogos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../shared/css/themes/fundo.css">
  <link rel="stylesheet" href="../shared/css/themes/semestre-picker.css">
  <link rel="stylesheet" href="jogo.css" />
  <link rel="stylesheet" href="../shared/css/audio/audio-btns.css" />
</head>
<body>

  <!-- BACKGROUND -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--2" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--3" aria-hidden="true"></div>

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar" aria-label="Navegação principal">
    <div id="sidebar-logo-wrap" class="sidebar__logo"></div>
    <ul class="sidebar__nav">
      <li class="sidebar__item">
        <a href="../index.html" class="sidebar__link" data-label="Início" aria-label="Início">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
        </a>
      </li>
      <li class="sidebar__item sidebar__item--active">
        <a href="#" class="sidebar__link" data-label="Jogos" aria-label="Jogos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M9 10v4M15 10v4M7 12h.01M17 12h.01M12 12h.01"/></svg>
        </a>
      </li>
      <li class="sidebar__item">
        <a href="#" class="sidebar__link" data-label="Perfil" aria-label="Perfil">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </a>
      </li>
    </ul>
    <div class="sidebar__xp">
      <div class="sidebar__xp-ring">
        <svg viewBox="0 0 36 36" class="xp-circle">
          <path class="xp-circle__bg"   d="M18 2.0845a 15.9155 15.9155 0 0 1 0 31.831a 15.9155 15.9155 0 0 1 0 -31.831"/>
          <path class="xp-circle__fill" stroke-dasharray="68, 100" d="M18 2.0845a 15.9155 15.9155 0 0 1 0 31.831a 15.9155 15.9155 0 0 1 0 -31.831"/>
        </svg>
        <span class="xp-label">Lv<br>7</span>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main" id="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <a href="../index.html" class="back-btn" aria-label="Voltar ao início">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span>Início</span>
      </a>
      <div class="topbar__right">
        <div id="semestre-wrap"></div>
      </div>
    </div>

    <!-- HERO -->
    <section class="hero">
      <div class="hero__bg" aria-hidden="true"></div>
      <div class="hero__content">
        <div class="hero__left">
          <div class="hero__eyebrow">
            <span aria-hidden="true">🎮</span> Modo Jogo <span class="title-tag">BETA</span>
          </div>
          <h1 class="hero__title">
            <span class="hero__title--top">escolha seu</span>
            <span class="hero__title--main">Game</span><span class="hero__title--accent">de Estudo</span>
          </h1>
          <p class="hero__sub">Aprenda jogando. Cada partida fixa um conceito. Avance mais rápido do que com qualquer revisão comum.</p>
          <div class="hero__stats">
            <div class="hero__stat">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
              <div>
                <span class="hero__stat-val" id="stat-available">0</span>
                <span class="hero__stat-lbl">disponíveis</span>
              </div>
            </div>
            <div class="hero__stat">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
              <div>
                <span class="hero__stat-val" id="stat-done">0</span>
                <span class="hero__stat-lbl">concluídos</span>
              </div>
            </div>
          </div>
        </div>

        <!-- MASCOTE — substitui o disco/controle -->
        <div class="hero__mascot" aria-hidden="true">
          <div class="hero__mascot-glow"></div>
          <div class="hero__mascot-particles">
            <span></span><span></span><span></span><span></span>
          </div>
          <img class="hero__mascot-img" src="../shared/img/games.png" alt="" />
        </div>
      </div>
    </section>

    <!-- FILTER STRIP -->
    <div class="filter-strip">
      <div class="filters__pills filter-strip__pills" id="filter-type" role="group" aria-label="Filtrar por tipo">
        <button class="pill pill--active" data-value="all">Todos</button>
        <button class="pill pill--type-pergunta"    data-value="Pergunta">Pergunta</button>
        <button class="pill pill--type-memorizacao" data-value="Memorização">Memorização</button>
        <button class="pill pill--type-dinamica"    data-value="Dinâmica">Dinâmica</button>
        <button class="pill pill--type-palavra"     data-value="Palavra">Palavra</button>
        <button class="pill pill--type-associacao"  data-value="Associação">Associação</button>
      </div>
      <div class="filter-strip__right">
        <p class="filter-strip__count">
          <strong id="results-count">0</strong> jogos
        </p>
        <select id="sort-select" class="sort-select" aria-label="Ordenar por">
          <option value="name">Nome A–Z</option>
          <option value="type">Tipo</option>
          <option value="status">Status</option>
        </select>
      </div>
    </div>

    <!-- GAME VAULT -->
    <div class="game-vault">
      <section class="game-grid" id="game-grid" aria-live="polite" aria-label="Jogos disponíveis">
        <!-- Cards rendered by JS -->
      </section>
      <div class="empty-state hidden" id="empty-state" role="status">
        <div class="empty-state__icon">🎮</div>
        <h3>Nenhum jogo encontrado</h3>
        <p>Tente ajustar os filtros para ver mais jogos.</p>
      </div>
    </div>

  </main>

  <!-- MODAL -->
  <div class="modal-overlay hidden" id="modal-overlay"
       role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal" id="modal">

      <!-- Splash panel -->
      <div class="modal__splash">
        <div class="modal__splash-icon" id="modal-icon"></div>
        <button class="modal__close" id="modal-close" aria-label="Fechar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Body -->
      <div class="modal__body">
        <div class="modal__header">
          <div class="modal__badge-row" id="modal-badges"></div>
          <h2 class="modal__title" id="modal-title"></h2>
          <p  class="modal__desc"  id="modal-desc"></p>
        </div>

        <!-- meta — hidden via CSS, kept for JS compat -->
        <div class="modal__meta" id="modal-meta" aria-hidden="true"></div>

        <!-- Discipline selector -->
        <div class="modal__disc-wrap" id="modal-disc-wrap">
          <label class="modal__disc-label" for="modal-disc-select">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
            </svg>
            Escolha a disciplina
          </label>
          <select class="modal__disc-select" id="modal-disc-select" aria-label="Selecionar disciplina">
            <option value="">— selecione —</option>
          </select>
        </div>

        <button class="modal__play-btn" id="modal-play-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Iniciar Jogo
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="jogo.js"></script>
  <script src="../shared/js/utils/quick-access.js"></script>
</body>
</html>
