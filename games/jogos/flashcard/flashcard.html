<!--
  NEXUS STUDY — Card/card.html
  Página de flashcards com Spaced Repetition.
  Estrutura espelhada de quiz/quiz.html.
  Todo conteúdo dinâmico é injetado por card.js em #card-root.
-->
<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcards · Nexus Study</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
    rel="stylesheet"
  />
  <!-- Font Awesome (ícones usados pelo card.js) -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous"
  />

  <link rel="stylesheet" href="flashcard.css" />
</head>

<body>

  <!-- ── BACKGROUND ─────────────────────────────── -->
  <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--2" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--3" aria-hidden="true"></div>
  <div class="bg-grid"          aria-hidden="true"></div>

  <!-- ════════════════════════════════════════════
       HEADER
       ════════════════════════════════════════════ -->
  <header class="header">
    <div class="header__inner">

      <a href="../../jogo.html" class="back-btn" aria-label="Voltar aos jogos">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span>Início</span>
      </a>

      <div class="header__logo" aria-label="Nexus Study">
        <div class="logo-mark" aria-hidden="true">N</div>
        <div class="logo-text">
          <span class="logo-title">Nexus</span>
          <span class="logo-sub">Study</span>
        </div>
      </div>

      <nav class="breadcrumb" aria-label="Localização">
        <span class="breadcrumb__item">Flashcards</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" aria-hidden="true">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
        <!--
          Preenchido por card.js com o nome da disciplina atual.
          Ex: "POO", "Redes", "Design"…
        -->
        <span class="breadcrumb__item breadcrumb__item--active"
              id="breadcrumb-disc" aria-live="polite">—</span>
      </nav>

    </div>
  </header>

  <!-- ════════════════════════════════════════════
       MAIN
       Contém apenas o ponto de montagem do componente.
       card.js injeta todo o HTML dinâmico aqui.
       ════════════════════════════════════════════ -->
  <main class="main" id="card-root" role="main" aria-label="Sessão de flashcards">
    <!--
      Esqueleto de carregamento exibido enquanto card.js
      aguarda dados do Firebase. Removido assim que o
      deck for montado (card.js apaga o conteúdo de #card-root).
    -->
    <div class="card-skeleton" id="card-skeleton" aria-busy="true" aria-label="Carregando flashcards">
      <div class="skeleton-bar skeleton-bar--short"></div>
      <div class="skeleton-scene">
        <div class="skeleton-pulse"></div>
      </div>
      <div class="skeleton-btns">
        <div class="skeleton-bar skeleton-bar--btn"></div>
        <div class="skeleton-bar skeleton-bar--btn"></div>
      </div>
    </div>
  </main>

  <!-- ════════════════════════════════════════════
       FOOTER
       ════════════════════════════════════════════ -->
  <footer class="footer">
    <p>© <span id="footer-year"></span> Nexus Study · Desenvolvido para facilitar seus estudos</p>
  </footer>

  <!-- ── TOAST GLOBAL ───────────────────────────────
       Usado por card.js para feedback de ação.
       card.js escreve em #card-toast-msg e
       adiciona / remove a classe .toast--visible.
       ─────────────────────────────────────────────── -->
  <div class="card-toast" id="card-toast" role="status" aria-live="polite">
    <i class="fas fa-rotate-left" aria-hidden="true"></i>
    <span id="card-toast-msg"></span>
  </div>

  <!--
    card.js é um módulo ES6.
    Ele importa CARDS_DATA e as funções do Firebase, depois
    chama initCards(discId, document.getElementById('card-root'), usuario).

    Para uso standalone, substitua discId e usuario conforme
    necessário ou passe via URL params:
      ?disc=poo&user=Rafael
  -->
  <script type="module" src="flashcard.js"></script>

  <!-- Fallback: ano no footer -->
  <script>
    document.getElementById('footer-year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
