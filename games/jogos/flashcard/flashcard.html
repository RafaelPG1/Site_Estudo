<!--
  NEXUS STUDY — games/jogos/flashcard/flashcard.html  (v2.0)

  REFATORAÇÃO v2.0
  ─────────────────
  game-shell.css agora é a FONTE ÚNICA para:
    :root (tokens), reset, .bg-grid, .bg-orb, .hidden

  flashcard.css mantém o header específico (.header, .back-btn)
  e todo o layout da sessão de cards (.cards-*, .intro-*, .finish-*).
-->
<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcards · Nexus Study</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous"
  />

  <link rel="stylesheet" href="../../template/game-shell.css" />
  <link rel="stylesheet" href="flashcard.css?v=6" />

  <!--
    ANTI-FLASH: script bloqueante executado ANTES do primeiro paint.
    Lê o localStorage síncronamente e aplica display inline nos elementos
    certos, impedindo qualquer frame intermediário com a tela errada.
    Não depende de nenhum módulo JS — é puro, mínimo e sem side-effects.
  -->
  <script>
    (function () {
      try {
        var TTL  = 24 * 60 * 60 * 1000;
        var disc = new URLSearchParams(location.search).get('disc');
        if (!disc) return;

        /* Verifica navState */
        var rawNav = localStorage.getItem('nexus_fc_navstate_' + disc);
        if (!rawNav) return;
        var nav = JSON.parse(rawNav);
        if (nav.view !== 'game') return;
        if (nav.ts && Date.now() - nav.ts > TTL) return;

        /* Verifica sessão — precisa ter pendentes */
        var rawSessao = localStorage.getItem('nexus_fc_sessao_' + disc);
        if (!rawSessao) return;
        var sessao = JSON.parse(rawSessao);
        if (!sessao.ts || Date.now() - sessao.ts > TTL) return;
        if (new Date(sessao.ts).toDateString() !== new Date().toDateString()) return;
        var respondidos = sessao.resultado ? Object.keys(sessao.resultado).length : 0;
        if (!sessao.cards || sessao.cards.length - respondidos <= 0) return;

        /* Sessão válida em andamento: aplica display ANTES do paint */
        document.documentElement.setAttribute('data-fc-restore', 'game');
      } catch (_) { /* localStorage indisponível — ignora */ }
    })();
  </script>

  <!--
    CSS bloqueante: aplicado antes do render quando data-fc-restore="game"
    está no <html>. Garante que o estado visual correto seja o primeiro
    frame pintado — sem depender de JS de módulo ou requestAnimationFrame.
  -->
  <style>
    html[data-fc-restore="game"] #intro-root { display: none !important; }
    html[data-fc-restore="game"] #card-root  { display: block !important; }
  </style>
</head>

<body>

  <!-- Background — definido em game-shell.css -->
  <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--2" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--3" aria-hidden="true"></div>
  <div class="bg-grid"          aria-hidden="true"></div>

  <header class="header">

    <a id="shell-back-btn" href="../../jogo.html" class="back-btn" aria-label="Voltar aos jogos">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M13 16l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Voltar</span>
    </a>

    <div class="header__identity">
      <div class="header__icon" id="header-icon">🃏</div>
      <div class="header__info">
        <div class="header__name">Flashcard</div>
        <div class="header__meta">
          <span class="header__disc" id="header-disc-name">—</span>
          <span class="header__meta-sep">•</span>
          <span class="header__sem" id="header-sem">—</span>
        </div>
      </div>
    </div>

  </header>

  <!-- ── TELA DE INÍCIO ── -->
  <main class="main intro-main" id="intro-root" role="main" aria-label="Tela de início — Flashcards">

    <div class="intro-card">

      <div class="intro-badge" aria-hidden="true">
        <i class="fas fa-layer-group"></i>
        <span>Modo de estudo</span>
      </div>

      <h1 class="intro-title">Flash<em>cards</em></h1>
      <p class="intro-subtitle">
        Vire cada card e marque se acertou ou errou.<br>
        O sistema adapta a frequência de revisão pra você.
      </p>

      <div class="intro-divider" aria-hidden="true"></div>

      <div class="intro-meta" role="group" aria-label="Disciplina e semestre">
        <span class="intro-chip intro-chip--disc" id="intro-chip-disc">
          <i class="fas fa-book-open" aria-hidden="true"></i>
          <span id="intro-disc-label">—</span>
        </span>
        <span class="intro-chip intro-chip--sem">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round" style="opacity:0.98">
            <path d="M8 2v4"/><path d="M16 2v4"/>
            <rect width="18" height="18" x="3" y="4" rx="2"/>
            <path d="M3 10h18"/>
            <path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/>
            <path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/>
          </svg>
          <span id="intro-sem-label">—</span>
        </span>
      </div>

      <div class="intro-info" role="list" aria-label="Informações do deck">
        <span class="intro-pill intro-pill--neutral" role="listitem">
          <i class="fas fa-clone" aria-hidden="true"></i>
          <strong id="intro-card-count">—</strong> questões no deck
        </span>
      </div>

      <div class="intro-actions">
        <button class="intro-start-btn" id="intro-start-btn" type="button"
                aria-label="Começar sessão de flashcards">
          Começar
          <i class="fas fa-chevron-right" aria-hidden="true"></i>
        </button>

        <button class="intro-start-btn intro-fc-btn--continuar hidden" id="intro-fc-btn-continuar" type="button"
                aria-label="Continuar sessão anterior de onde parou">
          Continuar
          <span class="fc-continuar-count" id="fc-continuar-progress"></span>
        </button>

        <button class="intro-revisar-btn hidden" id="intro-revisar-btn" type="button"
                aria-label="Revisar cards com erros">
          <i class="fas fa-rotate-left" aria-hidden="true"></i>
          Revisar erros
          <span class="intro-revisar-count" id="intro-revisar-count">0</span>
        </button>
      </div>

    </div>

  </main>

  <!-- ── MODAL DE REVISÃO DE ERROS ── -->
  <div class="fc-modal-overlay hidden" id="fc-modal-overlay" role="dialog"
       aria-modal="true" aria-label="Cards com erros">
    <div class="fc-modal" id="fc-modal">
      <div class="fc-modal-header">
        <div class="fc-modal-title">
          <i class="fas fa-triangle-exclamation" aria-hidden="true"></i>
          Cards para revisar
        </div>
        <button class="fc-modal-close" id="fc-modal-close" type="button" aria-label="Fechar">
          <i class="fas fa-xmark"></i>
        </button>
      </div>
      <div class="fc-modal-subtitle" id="fc-modal-subtitle">
        Cards que você errou ao menos uma vez, ordenados pela maior taxa de erro.
      </div>
      <div class="fc-modal-list" id="fc-modal-list" role="list"></div>
      <div class="fc-modal-footer">
        <button class="fc-modal-btn-cancel" id="fc-modal-cancel" type="button">Cancelar</button>
        <button class="fc-modal-btn-start"  id="fc-modal-start"  type="button">
          <i class="fas fa-rotate-left" aria-hidden="true"></i>
          Iniciar revisão
        </button>
      </div>
    </div>
  </div>

  <!-- ── JOGO (oculto até clicar em Começar) ── -->
  <main class="main" id="card-root" role="main" aria-label="Sessão de flashcards" style="display:none">

    <div class="card-skeleton" id="card-skeleton" aria-busy="true" aria-label="Carregando flashcards">
      <div class="skeleton-bar skeleton-bar--short"></div>
      <div class="skeleton-scene">
        <div class="skeleton-pulse"></div>
      </div>
      <div class="skeleton-btns">
        <div class="skeleton-bar skeleton-bar--btn"></div>
        <div class="skeleton-bar skeleton-bar--btn"></div>
      </div>
    </div>

  </main>


  <div class="card-toast" id="card-toast" role="status" aria-live="polite">
    <i class="fas fa-rotate-left" aria-hidden="true"></i>
    <span id="card-toast-msg"></span>
  </div>

  <script type="module" src="flashcard.js"></script>

  <script>
    window.flashcardSessao = {
      _chave:      (discId) => `nexus_fc_sessao_${discId}`,
      _chaveNav:   (discId) => `nexus_fc_navstate_${discId}`,
      _TTL: 24 * 60 * 60 * 1000, // 24h em ms

      /* ── Sessão de cards (estado mid-session) ── */
      salvar(estado) {
        try {
          const { discId, current, resultado, historico, cards, stats, difficulty } = estado;
          if (!discId) return;
          localStorage.setItem(
            this._chave(discId),
            JSON.stringify({ current, resultado, historico, cards, stats, difficulty, ts: Date.now() })
          );
        } catch (_) {}
      },
      carregar(discId) {
        try {
          const raw = localStorage.getItem(this._chave(discId));
          if (!raw) return null;
          const data = JSON.parse(raw);
          // Expira após 24h
          if (data.ts && Date.now() - data.ts > this._TTL) {
            this.limpar(discId);
            return null;
          }
          return data;
        } catch (_) { return null; }
      },
      limpar(discId) {
        try { localStorage.removeItem(this._chave(discId)); } catch (_) {}
      },

      /* ── Estado de navegação (qual tela estava ativa) ── */
      salvarNavState(discId, view) {
        // view: 'game' | 'intro'
        try {
          if (!discId) return;
          localStorage.setItem(
            this._chaveNav(discId),
            JSON.stringify({ view, ts: Date.now() })
          );
        } catch (_) {}
      },
      carregarNavState(discId) {
        try {
          const raw = localStorage.getItem(this._chaveNav(discId));
          if (!raw) return null;
          const data = JSON.parse(raw);
          // Nav state só vale enquanto a sessão existir e for do mesmo dia
          if (data.ts && Date.now() - data.ts > this._TTL) {
            this.limparNavState(discId);
            return null;
          }
          return data;
        } catch (_) { return null; }
      },
      limparNavState(discId) {
        try { localStorage.removeItem(this._chaveNav(discId)); } catch (_) {}
      },
    };

    document.getElementById('footer-year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
