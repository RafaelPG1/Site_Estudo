<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcards · Nexus Study</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous"
  />

  <!-- SEM game-shell.css — flashcard.css é autossuficiente -->
  <link rel="stylesheet" href="../../../shared/css/fundo.css">
  <link rel="stylesheet" href="flashcard.css?v=3" />
</head>

<body>

  <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--2" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--3" aria-hidden="true"></div>
  <div class="bg-grid"          aria-hidden="true"></div>

  <header class="header">
    <div class="header__inner">

      <a id="shell-back-btn" href="../../jogo.html" class="back-btn" aria-label="Voltar aos jogos">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span>Jogos</span>
      </a>

      <div class="header__logo" aria-label="Nexus Study">
        <div class="logo-mark" aria-hidden="true">N</div>
        <div class="logo-text">
          <span class="logo-title">Nexus</span>
          <span class="logo-sub">Study</span>
        </div>
      </div>

      <nav class="breadcrumb" aria-label="Localização">
        <span class="breadcrumb__item">Flashcards</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" aria-hidden="true">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
        <span class="breadcrumb__item breadcrumb__item--active"
              id="breadcrumb-disc" aria-live="polite">—</span>
      </nav>

    </div>
  </header>

  <main class="main" id="card-root" role="main" aria-label="Sessão de flashcards">

    <div class="card-skeleton" id="card-skeleton" aria-busy="true" aria-label="Carregando flashcards">
      <div class="skeleton-bar skeleton-bar--short"></div>
      <div class="skeleton-scene">
        <div class="skeleton-pulse"></div>
      </div>
      <div class="skeleton-btns">
        <div class="skeleton-bar skeleton-bar--btn"></div>
        <div class="skeleton-bar skeleton-bar--btn"></div>
      </div>
    </div>

  </main>

  <footer class="footer">
    <p>© <span id="footer-year"></span> Nexus Study · Desenvolvido para facilitar seus estudos</p>
  </footer>

  <div class="card-toast" id="card-toast" role="status" aria-live="polite">
    <i class="fas fa-rotate-left" aria-hidden="true"></i>
    <span id="card-toast-msg"></span>
  </div>

  <script type="module" src="flashcard.js"></script>

  <script>
    window.flashcardSessao = {
      _chave: (discId) => `nexus_fc_sessao_${discId}`,
      salvar(estado) {
        try {
          const { discId, current, resultado, historico, cards, stats, difficulty } = estado;
          if (!discId) return;
          sessionStorage.setItem(
            this._chave(discId),
            JSON.stringify({ current, resultado, historico, cards, stats, difficulty, ts: Date.now() })
          );
        } catch (_) {}
      },
      carregar(discId) {
        try {
          const raw = sessionStorage.getItem(this._chave(discId));
          return raw ? JSON.parse(raw) : null;
        } catch (_) { return null; }
      },
      limpar(discId) {
        try { sessionStorage.removeItem(this._chave(discId)); } catch (_) {}
      },
    };

    document.getElementById('footer-year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
