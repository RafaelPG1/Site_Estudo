<!--
  NEXUS STUDY — games/jogos/flashcard/flashcard.html
  Página de flashcards com Spaced Repetition.
  Todo conteúdo dinâmico é injetado por flashcard.js em #card-root.
-->
<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcards · Nexus Study</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
    rel="stylesheet"
  />

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous"
  />

  <!-- Shell base (orbs, grid, tokens compartilhados) -->
  <link rel="stylesheet" href="../../template/game-shell.css" />

  <!-- CSS específico do flashcard -->
  <link rel="stylesheet" href="flashcard.css" />
</head>

<body>

  <!-- ── BACKGROUND ─────────────────────────────── -->
  <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--2" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--3" aria-hidden="true"></div>
  <div class="bg-grid"          aria-hidden="true"></div>

  <!-- ════════════════════════════════════════════
       HEADER
       ════════════════════════════════════════════ -->
  <header class="header">
    <div class="header__inner">

      <!--
        id="shell-back-btn" → reconhecido pelo Shell.init() que injeta
        o href correto com ?sem= preservado.
        href estático serve de fallback se o JS ainda não carregou.
      -->
      <a id="shell-back-btn" href="../../jogo.html" class="back-btn" aria-label="Voltar aos jogos">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span>Jogos</span>
      </a>

      <div class="header__logo" aria-label="Nexus Study">
        <div class="logo-mark" aria-hidden="true">N</div>
        <div class="logo-text">
          <span class="logo-title">Nexus</span>
          <span class="logo-sub">Study</span>
        </div>
      </div>

      <nav class="breadcrumb" aria-label="Localização">
        <span class="breadcrumb__item">Flashcards</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" aria-hidden="true">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
        <!--
          Preenchido por flashcard.js com o nome da disciplina.
          Ex: "Banco de Dados", "Design"…
        -->
        <span class="breadcrumb__item breadcrumb__item--active"
              id="breadcrumb-disc" aria-live="polite">—</span>
      </nav>

    </div>
  </header>

  <!-- ════════════════════════════════════════════
       MAIN — ponto de montagem do componente
       flashcard.js injeta todo o HTML dinâmico aqui.
       ════════════════════════════════════════════ -->
  <main class="main" id="card-root" role="main" aria-label="Sessão de flashcards">

    <!-- Skeleton exibido enquanto o JS carrega -->
    <div class="card-skeleton" id="card-skeleton" aria-busy="true" aria-label="Carregando flashcards">
      <div class="skeleton-bar skeleton-bar--short"></div>
      <div class="skeleton-scene">
        <div class="skeleton-pulse"></div>
      </div>
      <div class="skeleton-btns">
        <div class="skeleton-bar skeleton-bar--btn"></div>
        <div class="skeleton-bar skeleton-bar--btn"></div>
      </div>
    </div>

  </main>

  <!-- ════════════════════════════════════════════
       FOOTER
       ════════════════════════════════════════════ -->
  <footer class="footer">
    <p>© <span id="footer-year"></span> Nexus Study · Desenvolvido para facilitar seus estudos</p>
  </footer>

  <!-- ── TOAST GLOBAL ──────────────────────────── -->
  <div class="card-toast" id="card-toast" role="status" aria-live="polite">
    <i class="fas fa-rotate-left" aria-hidden="true"></i>
    <span id="card-toast-msg"></span>
  </div>

  <!--
    flashcard.js — módulo ES6.
    Auto-init: lê ?disc= e ?sem= da URL e chama initCards().
  -->
  <script type="module" src="flashcard.js"></script>

  <!-- Ano no footer -->
  <script>
  window.flashcardSessao = {
    _chave: (discId) => `nexus_fc_sessao_${discId}`,
    salvar(estado) {
      try {
        const { discId, current, resultado, historico } = estado;
        if (!discId) return;
        sessionStorage.setItem(
          this._chave(discId),
          JSON.stringify({ current, resultado, historico, ts: Date.now() })
        );
      } catch (_) {}
    },
    carregar(discId) {
      try {
        const raw = sessionStorage.getItem(this._chave(discId));
        return raw ? JSON.parse(raw) : null;
      } catch (_) { return null; }
    },
    limpar(discId) {
      try { sessionStorage.removeItem(this._chave(discId)); } catch (_) {}
    },
  };
</script>

</body>
</html>
