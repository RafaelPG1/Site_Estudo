<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Associação</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="associacao.css" />
</head>
<body>

<div class="app-wrapper">

  <header class="topbar">
    <a href="#" class="btn-back" id="btn-back">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Voltar
    </a>
    <div class="progress-center">
      <div class="round-label">RODADA <span id="round-current">1</span> DE <span id="round-total">?</span></div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-pct" id="progress-pct">0%</div>
    </div>
    <div class="timer-badge">
      <div class="timer-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
      </div>
      <div class="timer-info">
        <span class="timer-lbl">Tempo</span>
        <span class="timer-val" id="timer-val">00:00</span>
      </div>
    </div>
  </header>

  <section class="hero">
    <h1 class="hero-title">Associação</h1>
    <p class="hero-sub">Arraste as respostas para as perguntas correspondentes</p>
  </section>

  <main class="main-panel">
    <div class="match-container">

      <div class="match-headers">
        <div class="col-header">
          <div class="col-dot cyan"></div>
          <span class="col-title cyan">Perguntas</span>
          <span class="card-count" id="q-count">4 itens</span>
        </div>
        <div class="col-header">
          <div class="col-dot gold"></div>
          <span class="col-title gold">Respostas</span>
          <span class="card-count" id="filled-count">0 / 4</span>
        </div>
      </div>

      <div class="match-grid" id="match-grid">
        <!-- preenchido pelo JS -->
      </div>

      <div class="answers-pool">
        <div class="pool-header">
          <div class="col-dot gold"></div>
          <span class="pool-title">Respostas disponíveis — arraste para os campos acima</span>
        </div>
        <div class="pool-grid" id="pool-grid">
          <!-- preenchido pelo JS -->
        </div>
      </div>

    </div>
  </main>

  <footer class="footer-actions">

    <button class="btn btn-secondary" id="btn-voltar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Voltar
    </button>

    <button class="btn btn-secondary" id="btn-reset">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Desfazer tudo
    </button>

    <button class="btn btn-primary" id="btn-verificar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" id="btn-verificar-icon">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      <span id="btn-verificar-label">Verificar</span>
    </button>

  </footer>

</div>

<div id="trash-zone" class="trash-zone" aria-label="Arrastar para remover">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="3 6 5 6 21 6"/>
    <path d="M19 6l-1 14H6L5 6"/>
    <path d="M10 11v6M14 11v6"/>
    <path d="M9 6V4h6v2"/>
  </svg>
</div>

<div id="toast" class="toast"></div>
    <div class="overlay-title" id="overlay-title"></div>
    <div class="overlay-sub" id="overlay-sub"></div>
    <button class="btn btn-primary overlay-btn" id="overlay-btn"></button>
  </div>
</div>

<script src="associacao.js" type="module"></script>
</body>
</html>
