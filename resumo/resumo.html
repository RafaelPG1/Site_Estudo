<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resumos — Nexus Study</title>

  <!-- ═══════════════════════════════════════════
       FONTES
  ═══════════════════════════════════════════ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- ═══════════════════════════════════════════
       ESTILOS BASE
  ═══════════════════════════════════════════ -->
  <link rel="stylesheet" href="../shared/css/themes/fundo.css" />

  <!-- ═══════════════════════════════════════════
       ESTILOS DE ÁUDIO (sound antes de audio-btns)
  ═══════════════════════════════════════════ -->
  <link rel="stylesheet" href="../shared/css/audio/sound.css" />
  <link rel="stylesheet" href="../shared/css/audio/audio-btns.css" />
  <link rel="stylesheet" href="../shared/css/themes/semestre-picker.css" />
  <!-- ═══════════════════════════════════════════
       ESTILOS DE COMPONENTES
  ═══════════════════════════════════════════ -->
  <link rel="stylesheet" href="../shared/css/ia/ia.css" />

  <!-- ═══════════════════════════════════════════
       ESTILOS DA PÁGINA
  ═══════════════════════════════════════════ -->
  <link rel="stylesheet" href="resumo.css" />

  <link rel="manifest" href="../manifest.json" />

  <!-- ═══════════════════════════════════════════
       PRELOAD DA IA — inicia o fetch de todos os
       scripts em paralelo, antes mesmo do resumo.js
       executar. Elimina a cascata de 5 requisições
       sequenciais que atrasava o FAB da IA.
  ═══════════════════════════════════════════ -->
  <link rel="modulepreload" href="../shared/js/ia/core/text-utils.js" />
  <link rel="modulepreload" href="../shared/js/ia/core/loader.js" />
  <link rel="modulepreload" href="../shared/js/ia/core/worker.js" />
  <link rel="modulepreload" href="../shared/js/ia/core/ui.js" />
  <link rel="modulepreload" href="../shared/js/ia/resumo/search.js" />
  <link rel="modulepreload" href="../shared/js/ia/resumo/assistant.js" />
  <link rel="modulepreload" href="../shared/js/ia/init.js" />
</head>
<body>

  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>
  <div class="bg-orb bg-orb--3"></div>
  <div class="bg-grid"></div>

  <!-- Barra de progresso de leitura -->
  <div class="reading-progress" id="reading-progress"></div>

  <!-- ═══════════════════════════════════════════
       HEADER
  ═══════════════════════════════════════════ -->
  <header class="header" id="app-header">
    <div class="header__inner">

      <div class="header__left">
        <a href="../index.html" class="btn-back" id="btn-back" title="Voltar ao início">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
          </svg>
          <span class="btn-back__label">Início</span>
        </a>

        <div class="header__divider"></div>

        <div id="header-logo-wrap" class="header__logo"></div>
      </div><!-- /header__left -->

      <div class="header__center" id="header-breadcrumb"></div>

      <div class="header__right">
        <div id="semestre-wrap-resumo"></div>
        <div class="disc-badge" id="disc-badge" style="display:none"></div>
        <span class="status-badge" id="header-status-badge" style="display:none"></span>
      </div>

    </div>
  </header>

  <!-- ═══════════════════════════════════════════
       LAYOUT COM SIDEBAR
  ═══════════════════════════════════════════ -->
  <div class="layout">

    <!-- SIDEBAR de disciplinas -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <span class="sidebar__title">Disciplinas</span>
        <span class="sidebar__semestre" id="sidebar-semestre">—</span>
      </div>
      <nav class="disc-list" id="disc-list" aria-label="Disciplinas disponíveis">
        <!-- JS injeta -->
      </nav>
      <div class="sidebar__footer">
        <span>Nexus Study · <span id="sidebar-year"></span></span>
      </div>
    </aside>

    <!-- CONTEÚDO -->
    <div class="content-area">

      <!-- HERO -->
      <div class="page-hero" id="page-hero">
        <div class="page-hero__inner">
          <div class="page-hero__eyebrow">
            <span class="eyebrow-dot"></span>
            <span id="hero-eyebrow-text">Carregando…</span>
          </div>
          <h1 class="page-hero__title">Resumos</h1>
          <p class="page-hero__sub" id="hero-sub">Selecione uma disciplina.</p>
          <div class="page-hero__stats" id="hero-stats"></div>
        </div>
      </div>

      <!-- VÍDEOS DAS AULAS (injetado pelo JS) -->
      <div id="videos-section" style="display:none"></div>

      <!-- MOBILE: botão de troca de disciplina -->
      <div class="mobile-toolbar" id="mobile-toolbar">
        <button class="mobile-disc-btn" id="mobile-disc-btn">
          <span id="mobile-disc-label">Disciplina</span>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
      </div>

      <!-- MAIN -->
      <main class="main" id="main-content">

        <!-- Estado: carregando -->
        <div class="state-empty" id="state-loading">
          <div class="spinner"></div>
          <p>Carregando…</p>
        </div>

        <!-- Estado: sem conteúdo -->
        <div class="state-empty" id="state-no-content" style="display:none">
          <span class="state-empty__icon" id="state-disc-emoji">📚</span>
          <strong id="state-disc-name">—</strong>
          <p>Nenhum resumo disponível ainda.</p>
          <small>O conteúdo desta disciplina será adicionado em breve.</small>
          <div class="coming-soon-pill">
            <span class="coming-soon-dot"></span>
            Em desenvolvimento
          </div>
        </div>

        <!-- Estado: filtro sem resultado -->
        <div class="state-empty" id="state-empty" style="display:none">
          <span class="state-empty__icon">🔍</span>
          <p>Nenhum resumo encontrado.</p>
          <small>Tente outro filtro ou termo de busca.</small>
        </div>

        <!-- Grid de cards -->
        <div class="resumos-grid" id="resumos-grid" style="display:none"></div>

      </main>

    </div><!-- /content-area -->
  </div><!-- /layout -->

  <!-- ═══════════════════════════════════════════
       READER MODE
  ═══════════════════════════════════════════ -->
  <div class="reader" id="read-modal" role="dialog" aria-modal="true" aria-label="Leitura do resumo">

    <header class="reader__bar" id="read-modal-panel" tabindex="-1">
      <button class="reader__back" id="read-modal-close" aria-label="Fechar leitor">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
        </svg>
        <span>Voltar</span>
      </button>

      <div class="reader__bar-meta">
        <span class="reader__bar-aula" id="rm-aula-label"></span>
        <span class="reader__bar-badge" id="rm-tipo-badge"></span>
      </div>

      <div class="reader__bar-progress" id="reader-progress-wrap">
        <div class="reader__bar-progress-fill" id="reader-progress-fill"></div>
      </div>
    </header>

    <div class="reader__scroll" id="rm-body-wrapper">
      <div class="reader__content" id="rm-body"></div>
    </div>

    <!-- TOC flutuante (oculto, mantido para compatibilidade JS) -->
    <nav class="rm-toc" id="rm-toc" aria-label="Seções do resumo" style="display:none"></nav>

  </div>

  <!-- ═══════════════════════════════════════════
       DROPDOWN MOBILE DE DISCIPLINAS
  ═══════════════════════════════════════════ -->
  <div class="mobile-dropdown" id="mobile-dropdown">
    <div class="mobile-dropdown__backdrop" id="mobile-dropdown-backdrop"></div>
    <div class="mobile-dropdown__sheet" id="mobile-dropdown-sheet">
      <div class="mobile-dropdown__handle"></div>
      <div class="mobile-dropdown__title">Selecionar disciplina</div>
      <div class="mobile-dropdown__list" id="mobile-dropdown-list"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       SCRIPTS
  ═══════════════════════════════════════════ -->
  <script type="module" src="resumo.js"></script>
  <script src="../shared/js/utils/quick-access.js"></script>
</body>
</html>
