<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anotações — Nexus Study</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../pessoal.css" />
</head>
<body class="notes-page">

  <!-- Ambient background -->
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>
  <div class="bg-orb bg-orb--3"></div>
  <div class="bg-grid"></div>

  <!-- ═══════════ HEADER ═══════════ -->
  <header class="header">
    <div class="header__inner">
      <div class="header__left">
        <a href="../pessoal.html" class="btn-back" title="Voltar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
          </svg>
        </a>
        <div class="logo">
          <span class="logo__mark">N</span>
          <div class="logo__text">
            <span class="logo__title">Nexus</span>
            <span class="logo__sub">Study</span>
          </div>
        </div>
        <div class="breadcrumb">
          <span class="breadcrumb__sep">/</span>
          <a href="../pessoal.html"
             style="font-size:.8rem;font-weight:500;color:var(--t3);letter-spacing:.03em;
                    transition:color .2s;"
             onmouseover="this.style.color='var(--t2)'"
             onmouseout="this.style.color='var(--t3)'">
            Área Pessoal
          </a>
          <span class="breadcrumb__sep">/</span>
          <span class="breadcrumb__page">Anotações</span>
        </div>
      </div>
    </div>
  </header>

  <!-- ═══════════ MAIN ═══════════ -->
  <main class="main">

    <!-- Toolbar -->
    <div class="notes-toolbar">
      <div class="notes-toolbar__left">
        <div style="display:flex;align-items:center;gap:.7rem;">
          <span style="font-size:1.6rem;line-height:1;filter:drop-shadow(0 0 10px rgba(77,217,180,.35));">📝</span>
          <div>
            <h1 style="font-family:var(--f-display);font-size:clamp(1.6rem,4vw,2.2rem);
                        font-weight:600;color:var(--teal);letter-spacing:-.01em;line-height:1.1;">
              Anotações
            </h1>
            <p style="font-size:.72rem;color:var(--t3);margin-top:.1rem;font-weight:300;">
              Ctrl+S para salvar
            </p>
          </div>
        </div>
      </div>
      <div class="notes-toolbar__right">
        <!-- Save status -->
        <span class="save-status" id="save-status">
          <span class="save-dot"></span>
          <span id="save-label">Aguardando</span>
        </span>
        <!-- Clear -->
        <button class="notes-btn notes-btn--danger" id="btn-clear" title="Limpar tudo">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
          </svg>
          Limpar
        </button>
        <!-- Save -->
        <button class="notes-btn notes-btn--primary" id="btn-save">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          Salvar
        </button>
      </div>
    </div>

    <!-- Notepad -->
    <div class="notes-pad">
      <textarea
        class="notes-textarea"
        id="notes-textarea"
        placeholder="Comece a digitar suas anotações…&#10;&#10;Use este espaço para registrar ideias, resumos de aula, dúvidas ou qualquer coisa que queira lembrar."
        spellcheck="true"
        autocomplete="off"
        aria-label="Área de anotações"
      ></textarea>
      <div class="notes-meta">
        <span class="notes-wordcount" id="notes-wordcount">0 palavras · 0 caracteres</span>
      </div>
    </div>

  </main>

  <footer class="footer">
    <p>© <span id="footer-year"></span> Nexus Study · Anotações</p>
  </footer>

  <!-- Toast -->
  <div class="nexus-toast" id="nexus-toast" role="status" aria-live="polite"></div>

  <!-- Confirm modal (clear) -->
  <div class="modal-backdrop" id="modal-backdrop" role="dialog"
       aria-modal="true" aria-label="Confirmar limpeza">
    <div class="modal-box">
      <div class="modal-head">
        <h3>Limpar anotações?</h3>
      </div>
      <div class="modal-body">
        Todo o conteúdo será apagado permanentemente. Esta ação não pode ser desfeita.
      </div>
      <div class="modal-actions">
        <button class="notes-btn" id="btn-modal-cancel">Cancelar</button>
        <button class="notes-btn notes-btn--danger" id="btn-modal-confirm">Limpar tudo</button>
      </div>
    </div>
  </div>

  <script type="module" src="anotacoes.js"></script>
</body>
</html>
