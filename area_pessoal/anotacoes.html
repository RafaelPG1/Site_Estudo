<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anotações — Nexus Study</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../pessoal.css" />
</head>
<body class="notes-page">

  <!-- Background -->
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>
  <div class="bg-orb bg-orb--3"></div>
  <div class="bg-grid"></div>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header__inner">
      <div class="header__logo">
        <a href="../pessoal.html" class="logo-back" title="Voltar à Área Pessoal">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
          </svg>
        </a>
        <span class="logo-mark">N</span>
        <div class="logo-text">
          <span class="logo-title">Nexus</span>
          <span class="logo-sub">Study</span>
        </div>
      </div>
      <div class="header__breadcrumb">
        <span class="breadcrumb-sep">/</span>
        <a href="../pessoal.html" class="breadcrumb-link" style="font-size:.82rem;color:var(--text-3);transition:color .2s;" onmouseover="this.style.color='var(--text-2)'" onmouseout="this.style.color='var(--text-3)'">Área Pessoal</a>
        <span class="breadcrumb-sep">/</span>
        <span class="breadcrumb-current">Anotações</span>
      </div>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="main">

    <!-- Toolbar -->
    <div class="notes-toolbar" style="animation: fade-up .45s ease both;">
      <div class="notes-toolbar__left">
        <div class="page-hero" style="gap:.9rem; animation:none; margin:0;">
          <div class="page-hero__icon" style="font-size:1.8rem;">📝</div>
          <div class="page-hero__text">
            <h1 class="page-hero__title" style="font-size:clamp(1.5rem,4vw,2rem);">Anotações</h1>
            <p class="page-hero__sub" style="font-size:.78rem;">Salvo automaticamente</p>
          </div>
        </div>
      </div>
      <div class="notes-toolbar__right">
        <span class="notes-save-status" id="save-status">
          <span class="notes-save-dot"></span>
          <span id="save-label">Aguardando…</span>
        </span>
        <button class="notes-btn notes-btn--danger" id="btn-clear-notes" title="Limpar tudo">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
          Limpar
        </button>
        <button class="notes-btn notes-btn--primary" id="btn-save-notes">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
          </svg>
          Salvar
        </button>
      </div>
    </div>

    <!-- Notepad -->
    <div class="notes-pad">
      <textarea
        class="notes-textarea"
        id="notes-textarea"
        placeholder="Comece a digitar suas anotações aqui…&#10;&#10;Use este espaço livre para registrar ideias, resumos, dúvidas ou qualquer coisa que queira lembrar."
        spellcheck="true"
        autocomplete="off"
        aria-label="Área de anotações"
      ></textarea>
      <div class="notes-meta">
        <span class="notes-wordcount" id="notes-wordcount">0 palavras · 0 caracteres</span>
      </div>
    </div>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <p>© <span id="footer-year"></span> Nexus Study · Área Pessoal</p>
  </footer>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- Confirm Modal (clear) -->
  <div class="modal" id="modal-confirm" role="dialog" aria-modal="true" aria-label="Confirmar limpeza">
    <div class="modal__overlay" id="modal-overlay-confirm"></div>
    <div class="modal__box modal__box--sm">
      <div class="modal__header">
        <h2 class="modal__title" style="font-size:1.15rem;">Limpar anotações?</h2>
      </div>
      <div class="modal__section" style="padding:1.25rem 1.75rem; font-size:.875rem; color:var(--text-2);">
        Todo o conteúdo será apagado permanentemente.
      </div>
      <div class="modal__footer">
        <button class="modal-btn modal-btn--ghost" id="btn-cancel-clear">Cancelar</button>
        <button class="modal-btn" id="btn-confirm-clear"
          style="background:var(--rose-dim);border-color:rgba(232,122,154,.35);color:var(--rose);">
          Limpar tudo
        </button>
      </div>
    </div>
  </div>

  <style>
    /* Inline modal styles (reusing pessoal.css variables) */
    .modal {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .modal--open { pointer-events: all; }
    .modal__overlay {
      position: absolute; inset: 0;
      background: rgba(7,11,20,.75); backdrop-filter: blur(6px);
      opacity: 0; transition: opacity .25s ease;
    }
    .modal--open .modal__overlay { opacity: 1; }
    .modal__box {
      position: relative; z-index: 1;
      width: 100%; max-width: 380px;
      background: var(--surface-2, #141c2e);
      border: 1px solid var(--border-glow); border-radius: 18px;
      overflow: hidden; box-shadow: 0 24px 64px rgba(0,0,0,.5);
      transform: translateY(16px) scale(.97); opacity: 0;
      transition: transform .3s cubic-bezier(.25,.8,.25,1), opacity .25s ease;
    }
    .modal--open .modal__box { transform: translateY(0) scale(1); opacity: 1; }
    .modal__header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 1.75rem .9rem;
      border-bottom: 1px solid var(--border);
    }
    .modal__title { font-family: var(--font-display); font-size: 1.35rem; font-weight: 600; color: var(--text-1); }
    .modal__section { padding: 1rem 1.75rem; border-bottom: 1px solid var(--border); }
    .modal__footer { display: flex; align-items: center; justify-content: flex-end; gap: .75rem; padding: 1rem 1.75rem; background: rgba(0,0,0,.15); }
    .modal-btn {
      display: inline-flex; align-items: center; gap: .5rem;
      font-family: var(--font-body); font-size: .82rem; font-weight: 600;
      letter-spacing: .04em; padding: .5rem 1.25rem; border-radius: 10px;
      cursor: pointer; transition: background .2s, box-shadow .2s;
      border: 1px solid transparent;
    }
    .modal-btn--ghost { background: transparent; border-color: var(--border-glow); color: var(--text-2); }
    .modal-btn--ghost:hover { background: rgba(255,255,255,.05); color: var(--text-1); }
  </style>

  <script type="module" src="anotacoes.js"></script>
</body>
</html>
