<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Área Pessoal — Nexus Study</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="pessoal.css" />
</head>
<body>

  <!-- Background -->
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>
  <div class="bg-orb bg-orb--3"></div>
  <div class="bg-grid"></div>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header__inner">
      <div class="header__logo">
        <a href="../index.html" class="logo-back" title="Voltar ao início">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
          </svg>
        </a>
        <span class="logo-mark">N</span>
        <div class="logo-text">
          <span class="logo-title">Nexus</span>
          <span class="logo-sub">Study</span>
        </div>
      </div>
      <div class="header__breadcrumb">
        <span class="breadcrumb-sep">/</span>
        <span class="breadcrumb-current">Área Pessoal</span>
      </div>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="main">

    <!-- Page Title -->
    <section class="page-hero">
      <div class="page-hero__icon">📚</div>
      <div class="page-hero__text">
        <h1 class="page-hero__title">Área Pessoal</h1>
        <p class="page-hero__sub">Seu espaço de organização e progresso</p>
      </div>
    </section>

    <!-- ===== ENTRY CARDS ===== -->
    <div class="entry-grid">

      <!-- Card: Checklist -->
      <div class="entry-card entry-card--gold" id="card-checklist-toggle">
        <div class="entry-card__header">
          <div class="entry-card__icon-wrap">
            <span class="entry-card__icon">✔️</span>
          </div>
          <div class="entry-card__info">
            <h2 class="entry-card__title">Checklist</h2>
            <p class="entry-card__desc">Tarefas, metas e progresso diário</p>
          </div>
          <button class="entry-card__toggle" id="btn-toggle-checklist" aria-expanded="false" aria-label="Expandir checklist">
            <svg class="toggle-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </button>
        </div>

        <!-- Checklist inline panel -->
        <div class="checklist-panel" id="checklist-panel" hidden>
          <div class="checklist-add">
            <input type="text" class="checklist-input" id="checklist-new-input" placeholder="Nova tarefa..." maxlength="120" />
            <button class="checklist-add-btn" id="btn-add-task" title="Adicionar">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </button>
          </div>

          <ul class="checklist-list" id="checklist-list">
            <!-- Items rendered by checklist.js -->
          </ul>

          <div class="checklist-footer">
            <span class="checklist-progress" id="checklist-progress">0 / 0 concluídas</span>
            <button class="checklist-clear-btn" id="btn-clear-done" title="Remover concluídas">
              Limpar concluídas
            </button>
          </div>
        </div>
      </div>

      <!-- Card: Anotações -->
      <a href="./anotacoes/anotacoes.html" class="entry-card entry-card--teal entry-card--link">
        <div class="entry-card__header">
          <div class="entry-card__icon-wrap">
            <span class="entry-card__icon">📝</span>
          </div>
          <div class="entry-card__info">
            <h2 class="entry-card__title">Anotações</h2>
            <p class="entry-card__desc">Bloco de notas pessoal com salvamento automático</p>
          </div>
          <div class="entry-card__cta">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14"/><path d="M12 5l7 7-7 7"/>
            </svg>
          </div>
        </div>
        <div class="entry-card__preview" id="notes-preview">
          <!-- preview loaded by pessoal.js -->
          <span class="preview-empty">Nenhuma anotação ainda…</span>
        </div>
      </a>

    </div><!-- /entry-grid -->

  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <p>© <span id="footer-year"></span> Nexus Study · Área Pessoal</p>
  </footer>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="module" src="checklist.js"></script>
  <script type="module" src="pessoal.js"></script>
</body>
</html>
